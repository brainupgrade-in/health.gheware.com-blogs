name: validate-indexes

# Runs on every push to main. Regenerates posts.json, sitemap.xml, and
# feed.xml from the post HTML files (the source of truth) and fails if the
# committed copies drift from the regenerated ones.
#
# This is a drift detector, not an auto-committer: it makes it impossible to
# merge a change that leaves the indexes stale, without granting the workflow
# write permission back to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate indexes from disk
        run: python3 scripts/regenerate_indexes.py

      - name: Fail if posts.json / sitemap.xml / feed.xml drifted
        run: |
          if ! git diff --exit-code posts.json sitemap.xml feed.xml; then
            echo ""
            echo "::error::Indexes are out of sync with posts/*.html."
            echo "::error::Run scripts/regenerate_indexes.py locally, commit the result, and push again."
            echo "::error::(scripts/publish.sh does this automatically — prefer that.)"
            exit 1
          fi
          echo "Indexes match disk ✓"
